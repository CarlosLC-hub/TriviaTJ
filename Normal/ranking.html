<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking - TriviaTJ</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle, #ba2929, #000);
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  padding: 20px;
}

h1 {
  margin-bottom: 30px;
}

.section {
  margin-bottom: 45px;
}

.section h2 {
  margin-bottom: 15px;
}

.ranking-container {
  max-width: 450px;
  margin: auto;
}

/* ANIMACIÓN DE ENTRADA */
.player {
  display: flex;
  justify-content: space-between;
  padding: 14px 18px;
  margin-bottom: 12px;
  border-radius: 12px;
  font-weight: bold;
  animation: fadeIn 0.4s ease;
  transition: 0.3s ease;
}

/* ORO */
.gold {
  color: black;
  background: linear-gradient(135deg, #d7c24d, #ffd900);
  box-shadow: 0 0 6px rgba(255,215,0,0.4);
}

/* PLATA */
.silver {
  color: #000;
  background: linear-gradient(135deg, #9e9e9e, #646262);
  box-shadow: 0 0 5px rgba(192,192,192,0.4);
}

/* BRONCE */
.bronze {
  color: #000;
  background: linear-gradient(135deg, #b87d38, #9a601d);
  box-shadow: 0 0 5px rgba(205,127,50,0.4);
}

/* RESTO */
.normal {
  background: rgba(255,255,255,0.1);
}

/* BRILLO PARA PRIMER LUGAR */
.gold span:first-child {
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 4px rgba(255,255,255,0.6); }
  to { text-shadow: 0 0 10px rgba(255,255,255,0.8); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<h1>🏆 Ranking General</h1>

<div class="section">
  <h2>🟢 Fácil</h2>
  <div class="ranking-container" id="ranking-facil">Cargando...</div>
</div>

<div class="section">
  <h2>🟠 Media</h2>
  <div class="ranking-container" id="ranking-media">Cargando...</div>
</div>

<div class="section">
  <h2>🔴 Difícil</h2>
  <div class="ranking-container" id="ranking-dificil">Cargando...</div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getFirestore, collection, query, orderBy, limit, where, getDocs } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIMormQk971x6UpOvY-IRJKmYdDVG3LkI",
  authDomain: "trivia-f0c84.firebaseapp.com",
  projectId: "trivia-f0c84",
  storageBucket: "trivia-f0c84.firebasestorage.app",
  messagingSenderId: "176201187022",
  appId: "1:176201187022:web:c09989347829d07f2fda9f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadRanking(difficulty, elementId) {
  const container = document.getElementById(elementId);
  container.innerHTML = "Cargando...";

  try {
    const q = query(
      collection(db, "scores"),
      where("currentDifficulty", "==", difficulty),
      orderBy("percentage", "desc"),
      limit(50) // puedes aumentar si quieres más jugadores
    );

    const snapshot = await getDocs(q);

    container.innerHTML = "";

    let lastPercentage = null;
    let displayPosition = 0;
    let realIndex = 0;

    snapshot.forEach((doc) => {
      const data = doc.data();
      realIndex++;

      // Actualiza la posición solo si cambia el porcentaje
      if (data.percentage !== lastPercentage) {
        displayPosition++;
        lastPercentage = data.percentage;
      }

      let medal = "";
      let className = "normal";

      if (displayPosition === 1) {
        medal = "🥇";
        className = "gold";
      } else if (displayPosition === 2) {
        medal = "🥈";
        className = "silver";
      } else if (displayPosition === 3) {
        medal = "🥉";
        className = "bronze";
      }

      container.innerHTML += `
        <div class="player ${className}">
          <span>${medal} ${data.name}</span>
          <span>${data.percentage}%</span>
        </div>
      `;
    });

    if(realIndex === 0){
      container.innerHTML = "No hay registros aún.";
    }

  } catch(error) {
    container.innerHTML = "Error cargando ranking.";
    console.error(error);
  }
}

// Cargar rankings
loadRanking("facil", "ranking-facil");
loadRanking("media", "ranking-media");
loadRanking("dificil", "ranking-dificil");
</script>

</body>
</html>
