<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Trivia Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ESTILOS -->
  <link rel="stylesheet" href="style-base.css">
  <link rel="stylesheet" href="style-effect.css">
  <link rel="stylesheet" href="style-powers.css">

  <!-- ESTILO DEL MODAL MEJORADO -->
  <style>
    #nameModal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.75);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      animation: fadeModal 0.25s ease;
    }

    @keyframes fadeModal {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    #nameModal .modal-content {
      background: #1c1c1c;
      color: #fff;
      padding: 25px 30px;
      border-radius: 16px;
      text-align: center;
      width: 90%;
      max-width: 360px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
      transform: translateY(-10px);
      animation: slideIn 0.3s forwards;
    }

    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    #nameModal h3 {
      margin-bottom: 18px;
      font-size: 1.3rem;
    }

    #nameModal input {
      padding: 12px;
      font-size: 16px;
      width: 85%;
      border-radius: 8px;
      border: 1px solid #555;
      margin-bottom: 20px;
      background: #2b2b2b;
      color: #fff;
    }

    #nameModal input::placeholder {
      color: #aaa;
    }

    #nameModal .modal-buttons {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    #nameModal button {
      flex: 1;
      padding: 12px 0;
      font-size: 16px;
      cursor: pointer;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      transition: 0.2s;
    }

    #nameModal button.save-btn {
      background: linear-gradient(135deg, #1e88e5, #1565c0);
      color: white;
    }

    #nameModal button.save-btn:hover {
      background: linear-gradient(135deg, #1565c0, #0d47a1);
    }

    #nameModal button.cancel-btn {
      background: #555;
      color: #ddd;
    }

    #nameModal button.cancel-btn:hover {
      background: #333;
    }

    .error-msg {
      color: #ff5252;
      margin-bottom: 15px;
      display: none;
      font-size: 14px;
    }
    
  </style>
</head>
<body>

<!-- ===== MENÚ MODO NORMAL ===== -->
<div id="mainMenu" class="pantalla activa">
  <div class="pantalla-contenido">

    <h1>Modo Normal</h1>

    <div class="descripcion">
      <p>🎯 Elige entre 3 dificultades</p>
      <p>⏱️ Responde antes de que el tiempo termine</p>
      <p>⭐ ¡Suma puntos por cada acierto!</p>
    </div>

    <div class="botones-modo">
      <button class="difficulty" onclick="showNameModal()">▶️ Jugar</button>
      <button class="ranking-btn" onclick="goRanking()">🏆 Ver Ranking</button>
    </div>
  </div>
</div>

<!-- ===== MENÚ DE CATEGORÍA ===== -->
<div id="menu" class="pantalla">
  <div class="pantalla-contenido">
    <h1>Selecciona dificultad</h1>
    <div class="difficulty-container">
      <button class="difficulty" onclick="chooseDifficulty('facil')">🟢 Fácil</button>
      <button class="difficulty" onclick="chooseDifficulty('media')">🟡 Medio</button>
      <button class="difficulty" onclick="chooseDifficulty('dificil')">🔴 Difícil</button>
    </div>
  </div>
</div>

<!-- ===== MODAL PARA NOMBRE ===== -->
<div id="nameModal">
  <div class="modal-content">
    <h3>Ingresa tu nombre</h3>
    <input type="text" id="playerInput" placeholder="Tu nombre">
    <div id="nameError" class="error-msg"></div>
    <div class="modal-buttons">
      <button class="save-btn" onclick="savePlayerName()">Guardar</button>
      <button class="cancel-btn" onclick="cancelPlayerName()">Cancelar</button>
    </div>
  </div>
</div>

<!-- ===== FIREBASE ===== -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAIMormQk971x6UpOvY-IRJKmYdDVG3LkI",
    authDomain: "trivia-f0c84.firebaseapp.com",
    projectId: "trivia-f0c84",
    storageBucket: "trivia-f0c84.firebasestorage.app",
    messagingSenderId: "176201187022",
    appId: "1:176201187022:web:c09989347829d07f2fda9f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function saveScore(name, percentage, currentDifficulty){
    try {
      const cleanId = name.trim().toLowerCase() + "-" + currentDifficulty;
      const ref = doc(db, "scores", cleanId);

      const now = new Date();
      const readableDate = now.toLocaleString("es-MX", { 
        year:"numeric", month:"2-digit", day:"2-digit", 
        hour:"2-digit", minute:"2-digit", second:"2-digit" 
      });

      await setDoc(ref, {
        name: name.trim(),
        percentage,
        currentDifficulty,
        date: readableDate
      });
    } catch(e){
      console.error("Error Firebase:", e);
    }
  }
  window.saveScore = saveScore;
</script>

<!-- ===== SCRIPTS DEL JUEGO ===== -->
<script src="../utils-navigation.js"></script>
<script src="../questions/questions-dificil.js"></script>
<script src="../questions/questions-media.js"></script>
<script src="../questions/questions-facil.js"></script>
<script src="game-timer.js"></script>
<script src="game-powers.js"></script>
<script src="game-questions.js"></script>
<script src="game-result.js"></script>

<script>
  let playerName = "";

  function showNameModal(){
    if(!playerName){
      document.getElementById("nameModal").style.display = "flex";
      document.getElementById("playerInput").value = "";
      document.getElementById("playerInput").focus();
      document.getElementById("nameError").style.display = "none"; // Asegura que el error esté oculto
    } else {
      showCategoryMenu();
    }
  }

  function savePlayerName(){
    const input = document.getElementById("playerInput");
    const errorMsg = document.getElementById("nameError");

    if(input.value && input.value.trim()){
      playerName = input.value.trim();
      document.getElementById("nameModal").style.display = "none";
      showCategoryMenu();
    } else {
      // Mostrar mensaje de error dentro del modal en lugar de alert
      errorMsg.style.display = "block";
      errorMsg.textContent = "Debes ingresar un nombre para jugar.";

            // 🔥 Desaparece después de 3 segundos
      setTimeout(() => {
        errorMsg.style.display = "none";
      }, 3000);
    
    }
  }

  function cancelPlayerName(){
    document.getElementById("nameModal").style.display = "none";
  }

  function showCategoryMenu(){
    document.getElementById("mainMenu").classList.remove("activa");
    document.getElementById("menu").classList.add("activa");
  }

  function goRanking() {
    window.location.href = "ranking.html";
  }
</script>

</body>
</html>
